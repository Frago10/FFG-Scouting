name: Deploy to GitHub Pages

on:
  # Triggered on every push to main
  push:
    branches: [main]
  # Allow manual run from the Actions tab
  workflow_dispatch:

# GitHub Pages required permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; new pushes cancel the previous queued run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Repo name becomes the URL prefix on GH Pages project pages:
          #   https://<user>.github.io/<repo>/
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Web3Forms key — store as a repo secret with the SAME name
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
